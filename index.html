<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OceanX — 2025 In Review</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- Preloader -->
  <div id="preloader" class="preloader">
    <div class="preloader__logo">OCEANX</div>
    <div class="preloader__progress">
      <div class="preloader__bar"><div class="preloader__fill" id="preloader-fill"></div></div>
      <div class="preloader__pct" id="preloader-pct">0%</div>
    </div>
  </div>

  <!-- Introduction -->
  <div id="introduction" class="introduction" style="display:none">
    <div class="intro__content">
      <p class="intro__label">OCEANX 2025 IN REVIEW</p>
      <h1 class="intro__title">Share the<br>Journey</h1>
    </div>
    <div class="intro__side">
      <p class="intro__desc">From deep-sea discoveries to groundbreaking summits,
        explore OceanX's transformative year of ocean exploration and research.</p>
      <button class="btn-cta" id="btn-enter">SHARE WEBSITE <span class="dot"></span></button>
    </div>
  </div>

  <!-- Site Header -->
  <header class="site-header" id="site-header" style="display:none">
    <button class="btn-audio" id="btn-audio">
      <svg width="18" height="13" viewBox="0 0 18 13" fill="none">
        <path d="M1 4.5H4.5L8.5 1.5V11.5L4.5 8.5H1V4.5Z" fill="currentColor"/>
        <path d="M11 4C12.8 5.8 12.8 7.2 11 9" stroke="currentColor" stroke-width="1.3" fill="none"/>
        <path d="M13.5 2C16.2 4.7 16.2 8.3 13.5 11" stroke="currentColor" stroke-width="1.3" fill="none"/>
      </svg>
      <span id="audio-label">AUDIO ON</span>
    </button>
    <div class="header__logo">OCEANX</div>
    <div class="header__right">
      <button class="btn-chapters">CHAPTERS</button>
      <button class="btn-menu"><span></span><span></span><span></span></button>
    </div>
  </header>

  <!-- Scroll Indicator -->
  <div class="scroll-indicator" id="scroll-indicator" style="display:none">
    <div class="scroll-indicator__line"></div>
    <span>SCROLL</span>
  </div>

  <!-- Bottom UI -->
  <div class="ui-bottom-left" id="ui-bottom" style="display:none">
    <span class="year-label">2025 A YEAR OF DISCOVERY</span>
  </div>
  <div class="ui-bottom-right" id="ui-share" style="display:none">
    <button class="btn-share" id="btn-share">SHARE <span>↗</span></button>
  </div>

  <!-- Partners Strip -->
  <div class="partners" id="partners" style="display:none">
    <div class="partners__track">
      <span>NUS</span><span>OCEANQUEST</span><span>ROLEX</span>
      <span>TANOTO FOUNDATION</span><span>TPC</span>
      <span>ANT INTERNATIONAL</span><span>HYUNDAI</span>
    </div>
  </div>

  <!-- WebGL Canvas -->
  <canvas id="webgl-canvas"></canvas>

  <!-- Scroll Container (2500vh) -->
  <div id="scroller" class="scroller">
    <div class="scroller-length"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
